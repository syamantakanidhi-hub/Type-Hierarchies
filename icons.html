    <nav>
        <a href="index.html" class="logo-link">nidhi</a>
        <ul class="nav-links">

    <main>
        <h1>Icons</h1>

        <!-- All logos combined — centered -->
        <div class="all-combined">
            <h2>All Combined</h2>
            <img src="images/icons/all combined.png" alt="All logos combined">
        </div>

        <!-- Section 1: Wordmark (Square) -->
        <section>
            <h2>Wordmark Square</h2>
            <img src="images/icons/wordmarksquare1.png" alt="Wordmark variant 1">
            <img src="images/icons/wordmarksquare2.png" alt="Wordmark variant 2">
            <img src="images/icons/wordmarksquare3.png" alt="Wordmark variant 3">
            <img src="images/icons/wordmarksquare4.png" alt="Wordmark variant 4">
            <img src="images/icons/wordmarksquare5.png" alt="Wordmark variant 5">
            <img src="images/icons/wordmarksquare6.png" alt="Wordmark variant 6">
        </section>

        <!-- Section 2: Wordmark + Icon (Portrait) -->
        <section>
            <h2>Wordmark + Icon</h2>
            <img src="images/icons/wordmarkportrait1.png" alt="Wordmark + icon variant 1">
            <img src="images/icons/wordmarkportrait2.png" alt="Wordmark + icon variant 2">
            <img src="images/icons/wordmarkportrait3.png" alt="Wordmark + icon variant 3">
            <img src="images/icons/wordmarkportrait4.png" alt="Wordmark + icon variant 4">
            <img src="images/icons/wordmarkportrait5.png" alt="Wordmark + icon variant 5">
            <img src="images/icons/wordmarkportrait6.png" alt="Wordmark + icon variant 6">
        </section>

        <!-- Section 3: Horizontal Lockup -->
        <section>
            <h2>Horizontal</h2>
            <img src="images/icons/horizontal1.png" alt="Horizontal lockup variant 1">
            <img src="images/icons/horizontal2.png" alt="Horizontal lockup variant 2">
            <img src="images/icons/horizontal3.png" alt="Horizontal lockup variant 3">
            <img src="images/icons/horizontal4.png" alt="Horizontal lockup variant 4">
            <img src="images/icons/horizontal5.png" alt="Horizontal lockup variant 5">
            <img src="images/icons/horizontal6.png" alt="Horizontal lockup variant 6">
        </section>

        <!-- Section 4: Icon Mark Only -->
        <section>
            <h2>Icon Mark</h2>
            <img src="images/icons/logo1.png" alt="Icon mark variant 1">
            <img src="images/icons/logo2.png" alt="Icon mark variant 2">
            <img src="images/icons/logo3.png" alt="Icon mark variant 3">
            <img src="images/icons/logo4.png" alt="Icon mark variant 4">
            <img src="images/icons/logo5.png" alt="Icon mark variant 5">
            <img src="images/icons/logo6.png" alt="Icon mark variant 6">
        </section>

        <!-- Section 5: Initials Mark -->
        <section>
            <h2>Initials</h2>
            <img src="images/icons/initials1.png" alt="Initials variant 1">
            <img src="images/icons/initials2.png" alt="Initials variant 2">
            <img src="images/icons/initials3.png" alt="Initials variant 3">
            <img src="images/icons/initials4.png" alt="Initials variant 4">
            <img src="images/icons/initials5.png" alt="Initials variant 5">
            <img src="images/icons/initials6.png" alt="Initials variant 6">
